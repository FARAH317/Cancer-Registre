version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: cancer_registry_db
    environment:
      POSTGRES_DB: cancer_registry
      POSTGRES_USER: registry_user
      POSTGRES_PASSWORD: registry_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cancer_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cancer_registry_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://registry_user:registry_pass_2024@db:5432/cancer_registry
      - SECRET_KEY=django-insecure-dev-key-change-in-production-2024
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      - db
    networks:
      - cancer_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cancer_registry_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - cancer_network

  nginx:
    image: nginx:alpine
    container_name: cancer_registry_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - cancer_network

volumes:
  postgres_data:

networks:
  cancer_network:
    driver: bridge
